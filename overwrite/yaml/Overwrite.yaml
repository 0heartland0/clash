# 规则提供者模板
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

  ip_yaml: &ip_yaml
    type: http
    interval: 86400
    behavior: ipcidr
    format: yaml

  domain_yaml: &domain_yaml
    type: http
    interval: 86400
    behavior: domain
    format: yaml

  class: &class
    type: http
    interval: 86400
    behavior: classical
    format: yaml

# =========================================
