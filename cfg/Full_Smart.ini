;搭配 OpenClash 绕过大陆功能使用的模板


[custom]
;设置规则标志位

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;本项目收录的直连域名规则
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/Direct_Classical.yaml,28800
;抖音直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/DouYin_Classical.yaml,28800
;钉钉直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/DingTalk_Classical.yaml,28800
;微信直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/WeChat_Classical.yaml,28800
;本项目收录的代理域名规则
ruleset=🚀 节点选择,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/Proxy_Classical.yaml,28800
;谷歌在国内可用的域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 地址强制直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/Steam_CDN_Classical.yaml,28800
;各大游戏平台下载域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
ruleset=💻 SSH专用,clash-classic:https://testingcf.jsdelivr.net/gh/0heartland0/clash@main/rule/yaml/SSH_Classical.yaml,28800
